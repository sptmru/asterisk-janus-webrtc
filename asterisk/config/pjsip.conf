[global]
type=global
user_agent=janus-softphone-asterisk

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
local_net=172.30.0.0/24
local_net=172.16.0.0/12
local_net=192.168.0.0/16
local_net=10.0.0.0/8

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
external_media_address=91.99.117.39
external_signaling_address=webrtc.sptm.online
local_net=172.16.0.0/12
local_net=192.168.0.0/16
local_net=10.0.0.0/8

[webrtc-endpoint](!)
type=endpoint
context=webrtc
transport=transport-wss
disallow=all
allow=opus
allow=ulaw
allow=alaw
webrtc=yes
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
ice_support=yes
media_use_received_transport=yes
rtcp_mux=yes
dtls_auto_generate_cert=yes
dtls_verify=fingerprint
dtls_setup=actpass
dtls_rekey=0
send_pai=yes
send_rpid=yes
trust_id_inbound=yes
trust_id_outbound=yes
moh_suggest=default

[janus-endpoint](!)
type=endpoint
context=webrtc
transport=transport-udp
disallow=all
allow=opus
allow=g722
allow=ulaw
allow=alaw
codec_prefs_incoming_offer=prefer:configured,operation:intersect,keep:first,transcode:allow
codec_prefs_outgoing_answer=prefer:configured,operation:intersect,keep:first,transcode:allow
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
dtmf_mode=rfc4733
send_pai=yes
send_rpid=yes
trust_id_inbound=yes
trust_id_outbound=yes
moh_suggest=default

[1001](webrtc-endpoint)
auth=1001
aors=1001
callerid=WebRTC 1001 <1001>

[1001]
type=auth
auth_type=userpass
username=1001
password=replace-with-strong-1001-password

[1001]
type=aor
max_contacts=1
remove_existing=yes
qualify_frequency=0

