services:
  janus-softphone:
    build: .
    container_name: janus-softphone
    restart: unless-stopped
    ports:
      - "${SOFTPHONE_HTTP_PORT:-9669}:80"

  asterisk:
    build: ./asterisk
    container_name: janus-asterisk
    restart: unless-stopped
    networks:
      voice_net:
        ipv4_address: ${ASTERISK_CONTAINER_IP:-172.30.0.10}
    ports:
      - "${ASTERISK_SIP_PORT:-5060}:5060/udp"
      - "${ASTERISK_SIP_PORT:-5060}:5060/tcp"
      - "${ASTERISK_HTTP_PORT:-8088}:8088/tcp"
      - "${ASTERISK_WSS_PORT:-8089}:8089/tcp"
      - "${ASTERISK_RTP_PORT_START:-10000}-${ASTERISK_RTP_PORT_END:-10100}:${ASTERISK_RTP_PORT_START:-10000}-${ASTERISK_RTP_PORT_END:-10100}/udp"
    volumes:
      - ${LETSENCRYPT_PATH:-/etc/letsencrypt}:/etc/letsencrypt:ro
      - ./deploy/generated/asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./deploy/generated/asterisk/http.conf:/etc/asterisk/http.conf:ro
      - ./deploy/generated/asterisk/rtp.conf:/etc/asterisk/rtp.conf:ro
      - asterisk_logs:/var/log/asterisk

  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: janus-fail2ban
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - asterisk
    environment:
      TZ: ${TZ:-UTC}
      F2B_LOG_TARGET: STDOUT
      F2B_LOG_LEVEL: INFO
    volumes:
      - ./fail2ban:/data
      - asterisk_logs:/var/log/asterisk:ro

  janus:
    image: canyan/janus-gateway:latest
    container_name: janus-gateway
    restart: unless-stopped
    depends_on:
      - asterisk
    ports:
      - "${JANUS_WS_PORT:-8188}:8188/tcp"
      - "${JANUS_WSS_PORT:-8989}:8989/tcp"
      - "${JANUS_RTP_PORT_START:-20000}-${JANUS_RTP_PORT_END:-20100}:${JANUS_RTP_PORT_START:-20000}-${JANUS_RTP_PORT_END:-20100}/udp"
    extra_hosts:
      - "${PUBLIC_DOMAIN:-webrtc.example.com}:${ASTERISK_CONTAINER_IP:-172.30.0.10}"
    networks:
      voice_net:
        ipv4_address: ${JANUS_CONTAINER_IP:-172.30.0.20}
    volumes:
      - ./deploy/generated/janus/janus.jcfg:/usr/local/etc/janus/janus.jcfg:ro
      - ./deploy/generated/janus/janus.transport.websockets.jcfg:/usr/local/etc/janus/janus.transport.websockets.jcfg:ro
      - ./deploy/generated/janus/janus.plugin.sip.jcfg:/usr/local/etc/janus/janus.plugin.sip.jcfg:ro
      - ${LETSENCRYPT_PATH:-/etc/letsencrypt}:/etc/letsencrypt:ro

networks:
  voice_net:
    driver: bridge
    ipam:
      config:
        - subnet: ${VOICE_SUBNET:-172.30.0.0/24}

volumes:
  asterisk_logs:
