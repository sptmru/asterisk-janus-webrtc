services:
  janus-softphone:
    build: .
    container_name: janus-softphone
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SOFTPHONE_HTTP_PORT:-9669}:80"

  softphone-https:
    image: nginx:1.27.5-alpine
    container_name: janus-softphone-https
    restart: unless-stopped
    depends_on:
      - janus-softphone
    ports:
      - "${SOFTPHONE_HTTPS_PORT:-443}:443/tcp"
    volumes:
      - ./deploy/generated/nginx/softphone-https.conf:/etc/nginx/conf.d/default.conf:ro
      - ${LETSENCRYPT_PATH:-/etc/letsencrypt}:/etc/letsencrypt:ro

  asterisk:
    build: ./asterisk
    container_name: janus-asterisk
    restart: unless-stopped
    networks:
      voice_net:
        ipv4_address: ${ASTERISK_CONTAINER_IP:-172.30.0.10}
    ports:
      - "${ASTERISK_SIP_PORT:-5060}:5060/udp"
      - "${ASTERISK_SIP_PORT:-5060}:5060/tcp"
      - "${ASTERISK_HTTP_PORT:-8088}:8088/tcp"
      - "${ASTERISK_WSS_PORT:-8089}:8089/tcp"
      - "${ASTERISK_RTP_PORT_START:-10000}-${ASTERISK_RTP_PORT_END:-10100}:${ASTERISK_RTP_PORT_START:-10000}-${ASTERISK_RTP_PORT_END:-10100}/udp"
    volumes:
      - ${LETSENCRYPT_PATH:-/etc/letsencrypt}:/etc/letsencrypt:ro
      - ./deploy/generated/asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./deploy/generated/asterisk/http.conf:/etc/asterisk/http.conf:ro
      - ./deploy/generated/asterisk/rtp.conf:/etc/asterisk/rtp.conf:ro
      - asterisk_logs:/var/log/asterisk

  fail2ban:
    image: crazymax/fail2ban:1.1.0
    container_name: janus-fail2ban
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - asterisk
    environment:
      TZ: ${TZ:-UTC}
      F2B_LOG_TARGET: STDOUT
      F2B_LOG_LEVEL: INFO
    volumes:
      - ./fail2ban:/data
      - asterisk_logs:/var/log/asterisk:ro

  turn:
    image: coturn/coturn:4.14.0
    container_name: janus-turn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./deploy/generated/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ${LETSENCRYPT_PATH:-/etc/letsencrypt}:/etc/letsencrypt:ro
    command:
      - -c
      - /etc/coturn/turnserver.conf

  certbot:
    image: certbot/certbot:v5.6.0
    container_name: janus-certbot
    profiles:
      - certbot
    ports:
      - "${LETSENCRYPT_HTTP_PORT:-80}:80/tcp"
    volumes:
      - ${LETSENCRYPT_PATH:-/etc/letsencrypt}:/etc/letsencrypt
      - certbot_work:/var/lib/letsencrypt
      - certbot_logs:/var/log/letsencrypt
    command:
      - certonly
      - --standalone
      - --non-interactive
      - --agree-tos
      - --email
      - ${LETSENCRYPT_EMAIL:?Set LETSENCRYPT_EMAIL in .env}
      - --preferred-challenges
      - http
      - -d
      - ${PUBLIC_DOMAIN:?Set PUBLIC_DOMAIN in .env}

  janus:
    image: canyan/janus-gateway:master@sha256:cddf2da2dba7947c2a3aa7b2e77b363b1200cd6874dbebe32b5148fe187a0d89
    container_name: janus-gateway
    restart: unless-stopped
    depends_on:
      - asterisk
    ports:
      - "${JANUS_WS_PORT:-8188}:8188/tcp"
      - "${JANUS_WSS_PORT:-8989}:8989/tcp"
      - "${JANUS_RTP_PORT_START:-20000}-${JANUS_RTP_PORT_END:-20100}:${JANUS_RTP_PORT_START:-20000}-${JANUS_RTP_PORT_END:-20100}/udp"
    extra_hosts:
      - "${PUBLIC_DOMAIN:-webrtc.example.com}:${ASTERISK_CONTAINER_IP:-172.30.0.10}"
    networks:
      voice_net:
        ipv4_address: ${JANUS_CONTAINER_IP:-172.30.0.20}
    volumes:
      - ./deploy/generated/janus/janus.jcfg:/usr/local/etc/janus/janus.jcfg:ro
      - ./deploy/generated/janus/janus.transport.websockets.jcfg:/usr/local/etc/janus/janus.transport.websockets.jcfg:ro
      - ./deploy/generated/janus/janus.plugin.sip.jcfg:/usr/local/etc/janus/janus.plugin.sip.jcfg:ro
      - ${LETSENCRYPT_PATH:-/etc/letsencrypt}:/etc/letsencrypt:ro

  prometheus:
    image: prom/prometheus:v3.13.0
    container_name: janus-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./deploy/generated/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules.yml:/etc/prometheus/rules/rules.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - node-exporter
      - cadvisor
      - blackbox-exporter

  grafana:
    image: grafana/grafana:11.6.16
    container_name: janus-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: janus-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.60.3
    container_name: janus-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.28.0
    container_name: janus-blackbox-exporter
    restart: unless-stopped
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

  loki:
    image: grafana/loki:3.6.11
    container_name: janus-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"
    command:
      - -config.file=/etc/loki/loki.yml
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.6.11
    container_name: janus-promtail
    restart: unless-stopped
    command:
      - -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

networks:
  voice_net:
    driver: bridge
    ipam:
      config:
        - subnet: ${VOICE_SUBNET:-172.30.0.0/24}

volumes:
  asterisk_logs:
  certbot_work:
  certbot_logs:
  prometheus_data:
  grafana_data:
  loki_data:
