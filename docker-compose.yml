services:
  janus-softphone:
    build: .
    container_name: janus-softphone
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SOFTPHONE_HTTP_PORT:-9669}:80"

  softphone-https:
    image: nginx:1.27.5-alpine
    container_name: janus-softphone-https
    restart: unless-stopped
    depends_on:
      - janus-softphone
    ports:
      - "${SOFTPHONE_HTTPS_PORT:-443}:443/tcp"
    volumes:
      - ./deploy/generated/nginx/softphone-https.conf:/etc/nginx/conf.d/default.conf:ro
      - ${LETSENCRYPT_PATH:-/etc/letsencrypt}:/etc/letsencrypt:ro

  asterisk:
    build: ./asterisk
    container_name: janus-asterisk
    restart: unless-stopped
    networks:
      voice_net:
        ipv4_address: ${ASTERISK_CONTAINER_IP:-172.30.0.10}
    ports:
      - "${ASTERISK_SIP_PORT:-5060}:5060/udp"
      - "${ASTERISK_SIP_PORT:-5060}:5060/tcp"
      - "${ASTERISK_HTTP_PORT:-8088}:8088/tcp"
      - "${ASTERISK_WSS_PORT:-8089}:8089/tcp"
      - "${ASTERISK_RTP_PORT_START:-10000}-${ASTERISK_RTP_PORT_END:-10100}:${ASTERISK_RTP_PORT_START:-10000}-${ASTERISK_RTP_PORT_END:-10100}/udp"
    volumes:
      - ${LETSENCRYPT_PATH:-/etc/letsencrypt}:/etc/letsencrypt:ro
      - ./deploy/generated/asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./deploy/generated/asterisk/http.conf:/etc/asterisk/http.conf:ro
      - ./deploy/generated/asterisk/rtp.conf:/etc/asterisk/rtp.conf:ro
      - asterisk_logs:/var/log/asterisk

  fail2ban:
    image: crazymax/fail2ban:1.1.0
    container_name: janus-fail2ban
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - asterisk
    environment:
      TZ: ${TZ:-UTC}
      F2B_LOG_TARGET: STDOUT
      F2B_LOG_LEVEL: INFO
    volumes:
      - ./fail2ban:/data
      - asterisk_logs:/var/log/asterisk:ro

  turn:
    image: coturn/coturn:4.14.0
    container_name: janus-turn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./deploy/generated/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ${LETSENCRYPT_PATH:-/etc/letsencrypt}:/etc/letsencrypt:ro
    command:
      - -c
      - /etc/coturn/turnserver.conf

  certbot:
    image: certbot/certbot:v5.6.0
    container_name: janus-certbot
    profiles:
      - certbot
    ports:
      - "${LETSENCRYPT_HTTP_PORT:-80}:80/tcp"
    volumes:
      - ${LETSENCRYPT_PATH:-/etc/letsencrypt}:/etc/letsencrypt
      - certbot_work:/var/lib/letsencrypt
      - certbot_logs:/var/log/letsencrypt
    command:
      - certonly
      - --standalone
      - --non-interactive
      - --agree-tos
      - --email
      - ${LETSENCRYPT_EMAIL:?Set LETSENCRYPT_EMAIL in .env}
      - --preferred-challenges
      - http
      - -d
      - ${PUBLIC_DOMAIN:?Set PUBLIC_DOMAIN in .env}

  janus:
    image: canyan/janus-gateway:master@sha256:cddf2da2dba7947c2a3aa7b2e77b363b1200cd6874dbebe32b5148fe187a0d89
    container_name: janus-gateway
    restart: unless-stopped
    depends_on:
      - asterisk
    ports:
      - "${JANUS_WS_PORT:-8188}:8188/tcp"
      - "${JANUS_WSS_PORT:-8989}:8989/tcp"
      - "${JANUS_RTP_PORT_START:-20000}-${JANUS_RTP_PORT_END:-20100}:${JANUS_RTP_PORT_START:-20000}-${JANUS_RTP_PORT_END:-20100}/udp"
    extra_hosts:
      - "${PUBLIC_DOMAIN:-webrtc.example.com}:${ASTERISK_CONTAINER_IP:-172.30.0.10}"
    networks:
      voice_net:
        ipv4_address: ${JANUS_CONTAINER_IP:-172.30.0.20}
    volumes:
      - ./deploy/generated/janus/janus.jcfg:/usr/local/etc/janus/janus.jcfg:ro
      - ./deploy/generated/janus/janus.transport.websockets.jcfg:/usr/local/etc/janus/janus.transport.websockets.jcfg:ro
      - ./deploy/generated/janus/janus.plugin.sip.jcfg:/usr/local/etc/janus/janus.plugin.sip.jcfg:ro
      - ${LETSENCRYPT_PATH:-/etc/letsencrypt}:/etc/letsencrypt:ro

networks:
  voice_net:
    driver: bridge
    ipam:
      config:
        - subnet: ${VOICE_SUBNET:-172.30.0.0/24}

volumes:
  asterisk_logs:
  certbot_work:
  certbot_logs:
